name: Agent Tools CI

on:
  push:
    paths:
      - 'projects/agent-tools/**'
      - '.github/workflows/agent-tools-test.yml'
  pull_request:
    paths:
      - 'projects/agent-tools/**'
      - '.github/workflows/agent-tools-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/agent-tools

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: projects/agent-tools/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
