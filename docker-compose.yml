services:
  # Agent Tools API - TODO management service
  agent-tools:
    build:
      context: ./projects/agent-tools
      dockerfile: Dockerfile
    container_name: agent-tools
    restart: unless-stopped
    ports:
      - "${AGENT_TOOLS_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - API_KEY=${AGENT_TOOLS_API_KEY:-default-api-key-change-in-production}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3001}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - agent-tools-data:/app/data
      - agent-tools-logs:/app/logs
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Agent Scheduler - Cron-like task scheduler
  agent-scheduler:
    build:
      context: ./projects/agent-scheduler
      dockerfile: Dockerfile
    container_name: agent-scheduler
    restart: unless-stopped
    ports:
      - "${AGENT_SCHEDULER_PORT:-3002}:3002"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3002
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - agent-scheduler-data:/app/data
      - agent-scheduler-logs:/app/logs
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Agent Dashboard - Observability and monitoring
  agent-dashboard:
    build:
      context: ./projects/agent-dashboard
      dockerfile: Dockerfile
    container_name: agent-dashboard
    restart: unless-stopped
    ports:
      - "${AGENT_DASHBOARD_PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - AGENT_TOOLS_URL=${AGENT_TOOLS_URL:-http://agent-tools:3000}
      - AGENT_SCHEDULER_URL=${AGENT_SCHEDULER_URL:-http://agent-scheduler:3002}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - agent-dashboard-logs:/app/logs
      # Mount memory directory as read-only for monitoring
      - ./memory:/app/memory:ro
    networks:
      - agent-network
    depends_on:
      agent-tools:
        condition: service_healthy
      agent-scheduler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

networks:
  agent-network:
    driver: bridge
    name: agent-network

volumes:
  agent-tools-data:
    name: agent-tools-data
    driver: local
  agent-tools-logs:
    name: agent-tools-logs
    driver: local
  agent-scheduler-data:
    name: agent-scheduler-data
    driver: local
  agent-scheduler-logs:
    name: agent-scheduler-logs
    driver: local
  agent-dashboard-logs:
    name: agent-dashboard-logs
    driver: local
